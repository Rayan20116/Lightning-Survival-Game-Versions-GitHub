<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lightning Survival Game</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #1a1a2e;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            color: #fff;
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 500px;
            background: linear-gradient(to bottom, #0f0c20, #24243e);
            border: 4px solid #4e54c8;
            border-radius: 8px;
            overflow: hidden;
        }

        /* UI Layer */
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        #health-bar {
            display: flex;
            gap: 5px;
        }

        .heart {
            font-size: 24px;
            color: #ff3366;
            text-shadow: 0 0 5px rgba(255, 51, 102, 0.5);
            transition: transform 0.3s ease;
        }

        .heart.lost {
            color: #444;
            text-shadow: none;
            transform: scale(0.8);
        }

        #timer {
            font-size: 20px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid #4e54c8;
        }

        /* Game Elements */
        #canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Screen Overlays */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 12, 32, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #game-over-screen h1 {
            color: #ff3366;
            text-shadow: 0 0 10px rgba(255, 51, 102, 0.5);
        }

        button {
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            background: #4e54c8;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 15px rgba(78, 84, 200, 0.4);
        }

        button:hover {
            background: #a855f7;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        /* Instructions */
        #controls-hint {
            margin-top: 15px;
            font-size: 14px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- UI Elements -->
        <div id="ui-layer">
            <div id="health-bar"></div>
            <div id="timer">Next Strike: 0s</div>
        </div>

        <!-- Graphics Canvas -->
        <canvas id="canvas"></canvas>

        <!-- Start Screen Overlay -->
        <div id="start-screen" class="overlay active">
            <h1>Lightning Dodge</h1>
            <button id="start-btn">Start Game</button>
            <div id="controls-hint">Use Left / Right Arrow keys or A / D to move</div>
        </div>

        <!-- Game Over Screen Overlay -->
        <div id="game-over-screen" class="overlay">
            <h1>Game Over</h1>
            <button id="restart-btn">Try Again</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const healthBar = document.getElementById('health-bar');
        const timerDisplay = document.getElementById('timer');
        
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');

        // Set high-res internal canvas dimensions
        canvas.width = 800;
        canvas.height = 500;

        // Game Configuration
        const MAX_HEALTH = 10;
        const RECOVERY_TIME_MS = 3000; // 3 seconds between lightning strikes for better gameplay balance

        // Game State Variables
        let health = MAX_HEALTH;
        let gameActive = false;
        let keys = {};
        let strikeTimer = 0; 
        let lastStrikeTime = 0;
        let lightningActive = false;
        let lightningX = 0;
        let lightningFlashFrame = 0;

        // Player Entity
        const player = {
            x: canvas.width / 2,
            y: canvas.height - 100,
            width: 30,
            height: 80,
            speed: 5,
            isInvulnerable: false,
            invulnerableTimer: 0
        };

        // Initialize heart icons in DOM
        function renderHealth() {
            healthBar.innerHTML = '';
            for (let i = 0; i < MAX_HEALTH; i++) {
                const heart = document.createElement('span');
                heart.classList.add('heart');
                heart.innerHTML = '♥';
                if (i >= health) {
                    heart.classList.add('lost');
                }
                healthBar.appendChild(heart);
            }
        }

        // Input Listeners
        window.addEventListener('keydown', (e) => keys[e.key] = true);
        window.addEventListener('keyup', (e) => keys[e.key] = false);

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        function startGame() {
            health = MAX_HEALTH;
            player.x = canvas.width / 2;
            player.isInvulnerable = false;
            lightningActive = false;
            strikeTimer = RECOVERY_TIME_MS;
            lastStrikeTime = performance.now();
            
            startScreen.classList.remove('active');
            gameOverScreen.classList.remove('active');
            gameActive = true;
            
            renderHealth();
        }

        function triggerLightningStrike() {
            // Pick a random target zone near the player's general area to make it dangerous
            const targetOffset = (Math.random() - 0.5) * 400;
            lightningX = Math.max(50, Math.min(canvas.width - 50, player.x + targetOffset));
            lightningActive = true;
            lightningFlashFrame = 15; // Displays for 15 frames

            // Hit collision detection box
            const lightningWidth = 40;
            const playerLeft = player.x - player.width / 2;
            const playerRight = player.x + player.width / 2;

            if (lightningX + lightningWidth/2 >= playerLeft && lightningX - lightningWidth/2 <= playerRight) {
                if (!player.isInvulnerable) {
                    damagePlayer();
                }
            }
        }

        function damagePlayer() {
            health--;
            renderHealth();
            
            // Flash character indication
            player.isInvulnerable = true;
            player.invulnerableTimer = 30; 

            if (health <= 0) {
                endGame();
            }
        }

        function endGame() {
            gameActive = false;
            gameOverScreen.classList.add('active');
        }

        // Update loop logic
        function update() {
            if (!gameActive) return;

            // Movement controls logic
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
                player.x -= player.speed;
            }
            if (keys['ArrowRight'] || keys['d'] || keys['D']) {
                player.x += player.speed;
            }

            // Boundary constraints
            if (player.x < player.width) player.x = player.width;
            if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;

            // Process timers
            const currentTime = performance.now();
            const elapsed = currentTime - lastStrikeTime;
            lastStrikeTime = currentTime;

            strikeTimer -= elapsed;

            if (strikeTimer <= 0) {
                triggerLightningStrike();
                strikeTimer = RECOVERY_TIME_MS; // reset timer loop
            }

            // Update visible numerical timer text display
            const secondsLeft = Math.max(0, Math.ceil(strikeTimer / 1000));
            timerDisplay.innerText = `Next Strike: ${secondsLeft}s`;

            if (player.invulnerableTimer > 0) {
                player.invulnerableTimer--;
                if (player.invulnerableTimer === 0) player.isInvulnerable = false;
            }
        }

        // Graphics Draw operations
        function draw() {
            // Clear Frame canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Environment ground base line
            ctx.strokeStyle = '#4e54c8';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(0, canvas.height - 20);
            ctx.lineTo(canvas.width, canvas.height - 20);
            ctx.stroke();// Draw Player character (Flashes if invulnerable/hit)
if (!player.isInvulnerable || Math.floor(player.invulnerableTimer / 3) % 2 
=== 0) {
ctx.fillStyle = '#a855f7'; // Neon purple block avatar
ctx.fillRect(player.x - player.width / 2, player.y, player.width, 
player.height);

// Outer glow effect
ctx.shadowColor = '#a855f7';
ctx.shadowBlur = 10;
ctx.fillRect(player.x - player.width / 2, player.y, player.width, 
player.height);
ctx.shadowBlur = 0; // Clear shadow}// Draw Lightning Strikeif 
(lightningActive && lightningFlashFrame > 0) 
{ctx.strokeStyle = '#ffff00'; 
// Electric yellowctx.lineWidth = 6;ctx.shadowColor = '#ffff00';
ctx.shadowBlur = 20;ctx.beginPath();
ctx.moveTo(lightningX, 0);

// Randomised jagged pathing
ctx.lineTo(lightningX - 25, canvas.height * 0.25);
ctx.lineTo(lightningX + 20, canvas.height * 0.55);
ctx.lineTo(lightningX - 10, canvas.height * 0.75);
ctx.lineTo(lightningX, canvas.height - 20);
ctx.stroke();
ctx.shadowBlur = 0; 

// Clear shadow
lightningFlashFrame--;if (lightningFlashFrame <= 0) 
{lightningActive = false;}}}

// Main game frame loop caller
function gameLoop() {update();
draw();
requestAnimationFrame(gameLoop);}

// Initialize display and trigger frame cycle
renderHealth();
requestAnimationFrame(gameLoop);
